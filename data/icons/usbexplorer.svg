<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- usbexplorer application icon: a stylised USB tree -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#3584e4"/>
  <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- trunk -->
    <line x1="32" y1="52" x2="32" y2="20"/>
    <!-- left branch -->
    <path d="M32 32 H20 V24"/>
    <!-- right branch -->
    <path d="M32 40 H44 V32"/>
  </g>
  <g fill="#ffffff">
    <!-- root node (USB connector head) -->
    <circle cx="32" cy="15" r="5"/>
    <!-- leaf nodes -->
    <rect x="15" y="18" width="10" height="7" rx="1.5"/>
    <circle cx="44" cy="28" r="4.5"/>
    <rect x="27" y="50" width="10" height="7" rx="1.5"/>
  </g>
</svg>
